<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zahra's Translation App</title>
    <meta name="description"
        content="Real-time voice-to-text translator for English and Finnish with zero latency feel.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
</head>

<body>
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
    <main class="glass-container">
        <header>
            <h1>Zahra's <span>Translator</span></h1>
            <p class="subtitle">AI-Powered Real-time Conversation</p>
        </header>

        <section class="controls">
            <div id="interpreter-status" class="interpreter-status hidden">
                <span class="pulse-dot"></span>
                <span id="interpreter-text">Interpreter Active</span>
            </div>

            <div class="mic-section">
                <button id="mic-btn" class="mic-glow">
                    <svg viewBox="0 0 24 24" width="40" height="40" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                        <line x1="12" y1="19" x2="12" y2="23"></line>
                        <line x1="8" y1="23" x2="16" y2="23"></line>
                    </svg>
                </button>
            </div>
            
            <p id="status-text" class="status-minimal">Tap to start</p>
        </section>

        <section class="results">
            <div class="language-selector">
                <button class="lang-btn active" data-lang="en">EN</button>
                <button class="lang-btn" data-lang="fi">FI</button>
                <button class="lang-btn" data-lang="fa">Persian</button>
                <div class="divider"></div>
                <button id="interpreter-mode-btn" class="interpreter-btn">
                    <span class="icon">🤖</span> Auto Interpreter
                </button>
            </div>
            <div class="input-grid">
                <div class="result-card">
                    <div class="card-header">
                        <h3>Input <span id="source-lang-tag">(Detection On)</span></h3>
                    </div>
                    <textarea id="source-box" class="text-box" placeholder="Speak or type..."></textarea>
                </div>

                <div class="result-card">
                    <div class="card-header">
                        <h3>Translation <span id="target-lang-tag">(Output)</span></h3>
                        <button id="speak-btn" title="Hear Pronunciation">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                        </button>
                    </div>
                    <div id="translation-box" class="text-box highlight">...</div>
                </div>
            </div>
        </section>

        <footer>
            <p>Zero-Touch Translation • Auto-Detection • Instant Speech</p>
        </footer>
    </main>

    <script src="script.js"></script>
</body>

</html>
